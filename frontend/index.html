<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clickup da TEMU</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="card header">
        <h1 class="title">clickup da TEMU</h1>
        <div class="role-box">
          <span class="role-label">Role atual: <strong id="currentRole">Admin</strong></span>
          <button type="button" onclick="setRole('admin')" class="role-btn role-admin">Admin</button>
          <button type="button" onclick="setRole('manager')" class="role-btn role-manager">Manager</button>
          <button type="button" onclick="setRole('member')" class="role-btn role-member">Member</button>
          <button type="button" onclick="setRole('viewer')" class="role-btn role-viewer">Viewer</button>
        </div>
      </header>

      <section class="stats-grid">
        <article class="card stat-card">
          <p class="stat-title">Utilizadores</p>
          <p id="totalUsers" class="stat-value">0</p>
          <p>Ativos: <strong id="activeUsers">0</strong></p>
          <p>Percentagem: <strong id="activePercentage">0%</strong></p>
        </article>

        <article class="card stat-card">
          <p class="stat-title">Tarefas</p>
          <p id="totalTasks" class="stat-value">0</p>
          <p>Concluidas: <strong id="completedTasks">0</strong></p>
          <p>Pendentes: <strong id="pendingTasks">0</strong></p>
        </article>

        <article class="card stat-card">
          <p class="stat-title">Tags</p>
          <div class="tags-tools">
            <input id="newTagName" class="input" type="text" placeholder="Nova tag" />
            <button id="createTagBtn" type="button" class="btn btn-primary">Criar</button>
          </div>
          <div id="tagsList" class="tags-list"></div>
        </article>
      </section>

      <section class="card section">
        <div class="section-header">
          <h2 class="section-title">Tarefas</h2>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <input id="taskSearchInput" class="input" type="search" placeholder="Pesquisar tarefas" />
            <button id="createTaskBtn" type="button" class="btn btn-primary">Nova Tarefa</button>
          </div>
        </div>

        <div class="filters">
          <button type="button" data-status="all" class="task-filter-btn active">Todas</button>
          <button type="button" data-status="pending" class="task-filter-btn">Pendentes</button>
          <button type="button" data-status="in-progress" class="task-filter-btn">Em Progresso</button>
          <button type="button" data-status="completed" class="task-filter-btn">Concluidas</button>
        </div>

        <div class="table-wrap">
          <table id="taskTable" class="table">
            <thead>
              <tr>
                <th>Titulo</th>
                <th>Categoria</th>
                <th>Responsavel</th>
                <th>Tags</th>
                <th>Estado</th>
                <th>Criacao</th>
                <th>Acoes</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="card section">
        <div class="section-header">
          <h2 class="section-title">Utilizadores</h2>
          <button id="createUserBtn" type="button" class="btn btn-primary">Novo Utilizador</button>
        </div>

        <div class="filters">
          <button type="button" data-status="all" class="user-filter-btn active">Todos</button>
          <button type="button" data-status="active" class="user-filter-btn">Ativos</button>
          <button type="button" data-status="inactive" class="user-filter-btn">Inativos</button>
        </div>

        <div class="table-wrap">
          <table id="userTable" class="table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Estado</th>
                <th>Criacao</th>
                <th>Acoes</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>

    <div id="userModal" class="modal-hidden">
      <div class="modal-content">
        <h3 id="userModalTitle" class="modal-title">Novo Utilizador</h3>
        <form id="userForm">
          <input id="userId" type="hidden" />
          <div class="form-grid">
            <div class="field field-full">
              <label for="userName">Nome</label>
              <input id="userName" class="input" required />
            </div>
            <div class="field field-full">
              <label for="userEmail">Email</label>
              <input id="userEmail" class="input" type="email" required />
            </div>
            <div class="field field-full">
              <label for="userStatus">Estado</label>
              <select id="userStatus" class="select">
                <option value="active">Ativo</option>
                <option value="inactive">Inativo</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" onclick="closeUserModal()" class="btn btn-neutral">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <div id="taskModal" class="modal-hidden">
      <div class="modal-content">
        <h3 id="taskModalTitle" class="modal-title">Nova Tarefa</h3>
        <form id="taskForm">
          <input id="taskId" type="hidden" />
          <div class="form-grid">
            <div class="field field-full">
              <label for="taskTitle">Titulo</label>
              <input id="taskTitle" class="input" required />
            </div>
            <div class="field">
              <label for="taskCategory">Categoria</label>
              <input id="taskCategory" class="input" required />
            </div>
            <div class="field">
              <label for="taskResponsible">Responsavel</label>
              <input id="taskResponsible" class="input" required />
            </div>
            <div class="field">
              <label for="taskStatus">Estado</label>
              <select id="taskStatus" class="select">
                <option value="pending">Pendente</option>
                <option value="in-progress">Em Progresso</option>
                <option value="completed">Concluido</option>
              </select>
            </div>
            <div class="field">
              <label for="taskTagsSelect">Tags (multi-selecao)</label>
              <select id="taskTagsSelect" class="select" multiple>
                <option disabled>Selecionar tags</option>
              </select>
            </div>
            <div id="taskCommentsSection" class="field field-full comments-section comments-hidden">
              <label for="taskCommentInput">Comentários</label>
              <div id="taskCommentsList" class="comments-list"></div>
              <textarea id="taskCommentInput" class="input comments-input" rows="3" placeholder="Adicionar comentário"></textarea>
              <div class="comments-actions">
                <button id="addTaskCommentBtn" type="button" class="btn btn-neutral">Adicionar comentário</button>
              </div>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" onclick="closeTaskModal()" class="btn btn-neutral">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
